name: Deploy React App
on: push
jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Get the repository code
        uses: actions/checkout@v7
      - name: Install dependecies
        run: npm i
      - name: Test application
        run: npm run test
  lint:
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - name: Get the repository code
        uses: actions/checkout@v7
      - name: Install dependecies
        run: npm i
      - name: Lint application
        run: npm run lint
  build:
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - name: Get the repository code
        uses: actions/checkout@v7
      - name: Install dependecies
        run: npm i
      - name: Build application
        run: npm run build
      - name: Deploy
        run: echo Deploying...
